name: Auto-merge Dependabot

on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    if: >
      github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Auto-merge minor and patch updates
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const title = pr.title;

            const match = title.match(/from (\d+)\.(\d+)\.(\d+) to (\d+)\.(\d+)\.(\d+)/);
            if (!match) {
              console.log("Could not parse version numbers.");
              return;
            }

            const [_, fromMajor, fromMinor, fromPatch, toMajor, toMinor, toPatch] = match.map(Number);

            const isMajor = toMajor > fromMajor;
            const isMinor = toMajor === fromMajor && toMinor > fromMinor;
            const isPatch = toMajor === fromMajor && toMinor === fromMinor && toPatch > fromPatch;

            if (isMajor) {
              console.log("Major update — skipping auto-merge.");
              return;
            }

            if (!(isMinor || isPatch)) {
              console.log("Not a standard semver bump — skipping.");
              return;
            }

            await github.rest.pulls.enableAutoMerge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: "squash"
            });